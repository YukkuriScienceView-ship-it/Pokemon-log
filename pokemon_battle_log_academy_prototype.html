    p1ranks:mkRanks(),p2ranks:mkRanks(),
    p1extra:[],p2extra:[],

  return{turns:[],nextTurn:1,opening:mkOR(),openingSnap:null,litLamps:{},
    parties:{1:[mkPoke('ピカチュウ'),mkPoke('リザードン'),mkPoke('カビゴン'),mkPoke('ゲンガー'),mkPoke('カメックス'),mkPoke('フシギバナ')],
             2:[mkPoke('ピカチュウ'),mkPoke('リザードン'),mkPoke('カビゴン'),mkPoke('ゲンガー'),mkPoke('カメックス'),mkPoke('フシギバナ')]}};

function mkPoke(name){
  const ev={};EV_STATS.forEach(s=>ev[s]=0);
  const iv={};EV_STATS.forEach(s=>iv[s]=31);
  return{name,level:50,gender:'',nature:'',note:'',maxHP:DEFAULT_HP[name]||100,currentHP:DEFAULT_HP[name]||100,fainted:false,ev,iv,ability:'',item:'',
    moves:DEFAULT_MOVES[name]?[...DEFAULT_MOVES[name]]:['','','',''],
    pp:[10,10,10,10]};
}
function mkRanks(){const r={};RANK_STATS.forEach(s=>r[s]=0);return r;}
function mkHazards(){return{hikari:false,reflector:false,magic:false,oikaze:false,makibishi:0,dokubishi:0,sutero:0,nebaneba:0,togasteel:0};}
function mkCell(action){
  return{action,move:'—',moveCount:1,critCount:0,status:'none',extra:[],ranks:mkRanks(),absentType:0,
    switchInIdx:undefined,outIdx:undefined,fieldIdx:undefined,
    outStatus:'none',outRanks:mkRanks(),inHP:undefined,outHP:undefined,
    benchIdx:undefined,benchStatus:'none',benchHP:undefined,
    memo:'',memoIn:'',memoOut:'',memoField:'',memoBench:''};
}
function registerMove(pk,moveName){
  if(!moveName||moveName==='—')return;
  if(pk.moves.includes(moveName))return;
  const idx=pk.moves.findIndex(m=>!m.trim());if(idx!==-1)pk.moves[idx]=moveName;
}
// ターン終了後の実際の場のポケモンインデックスを返す（こうかん・控えを正しく追跡）
function getActivePokeAfterTurn(side,turnIdx){
  if(turnIdx<0)return state.opening['p'+side+'idx'];
  const t=state.turns[turnIdx];const c=side===1?t.c1:t.c2;
  if(c.action==='こうかん'&&c.switchInIdx!==undefined)return c.switchInIdx;
  if(c.action==='控え')return getActivePokeAfterTurn(side,turnIdx-1); // 控えは場を変えないので前ターンへ遡る
  return t['p'+side+'idx']; // わざの場合はそのターンの選択値
}
function getPrevPokeIdx(side,turnIdx){
  if(turnIdx===0)return state.opening['p'+side+'idx'];
  return getActivePokeAfterTurn(side,turnIdx-1);
}
function copyRanks(src){const r={};RANK_STATS.forEach(s=>r[s]=src[s]||0);return r;}
function getActiveCellData(side,n){
  if(n===0){
    const statusKey='p'+side+'status';const memoKey='p'+side+'memo';
    const ranksKey='p'+side+'ranks';const extraKey='p'+side+'extra';
    return{status:state.opening[statusKey]||'none',extra:[...(state.opening[extraKey]||[])],memo:state.opening[memoKey]||'',ranks:copyRanks(state.opening[ranksKey]||mkRanks())};
  }
  const prev=state.turns[n-1];const c=side===1?prev.c1:prev.c2;
  if(c.action==='こうかん')return{status:c.status||'none',extra:[...(c.extra||[])],memo:c.memoIn||'',ranks:copyRanks(c.ranks)};
  if(c.action==='控え')return{status:c.status||'none',extra:[...(c.extra||[])],memo:c.memoField||'',ranks:copyRanks(c.ranks)};
  return{status:c.status||'none',extra:[...(c.extra||[])],memo:c.memo||'',ranks:copyRanks(c.ranks)};
}
function snapshotParties(){
  const snap={};
  [1,2].forEach(p=>{
    snap[p]=state.parties[p].map(pk=>({
      currentHP:pk.currentHP,
      currentStatus:pk.currentStatus,
      currentExtra:[...(pk.currentExtra||[])],
      currentMemo:pk.currentMemo
    }));
  });
  return snap;
}
function restoreParties(snap){
  [1,2].forEach(p=>{
    state.parties[p].forEach((pk,i)=>{
      if(!snap[p][i])return;
      pk.currentHP=snap[p][i].currentHP;
      pk.currentStatus=snap[p][i].currentStatus;
      pk.currentExtra=[...(snap[p][i].currentExtra||[])];
      pk.currentMemo=snap[p][i].currentMemo;
    });
  });
}
function addTurn(){
  const isFainted=pk=>!pk||pk.currentHP<=0;
  // 全滅チェック
  const p1name=document.getElementById('p1name').value||'プレイヤー1';
  const p2name=document.getElementById('p2name').value||'プレイヤー2';
  if(state.parties[1].every(isFainted)){alert(p1name+'のポケモンが全滅しています');return;}
  if(state.parties[2].every(isFainted)){alert(p2name+'のポケモンが全滅しています');return;}
  const n=state.turns.length;const prev=n>0?state.turns[n-1]:null;
  // DOMから前ターンの場のポケモンインデックスを取得
  const getPrevIdxFromDOM=(side)=>{
    if(n===0)return state.opening['p'+side+'idx'];
    const sel=document.getElementById('pksel-'+side+'-'+(n-1));
    return sel?parseInt(sel.value):getActivePokeAfterTurn(side,n-1);
  };
  let p1idx=getPrevIdxFromDOM(1);
  let p2idx=getPrevIdxFromDOM(2);
  // 瀕死でも自動交代しない - ポケモンはそのまま場に残す
  const d1=getActiveCellData(1,n);const d2=getActiveCellData(2,n);
  const alive=(parties,i)=>parties[i]&&parties[i].currentHP>0;
  const firstAlive=(parties,exclude)=>parties.findIndex((pk,i)=>i!==exclude&&pk.currentHP>0);
  // スナップ前に前ターンのcell status/memoをpkへ書き戻す（次ターンのデフォルト復元用）
  if(prev){
    const syncCell=(t,side)=>{
      const c=side===1?t.c1:t.c2;const parties=state.parties[side];
      let pkIdx,st,memo;
      if(c.action==='わざ'){pkIdx=t['p'+side+'idx'];st=c.status;memo=c.memo;}
      else if(c.action==='こうかん'){pkIdx=c.switchInIdx;st=c.status;memo=c.memoIn;}
      else if(c.action==='控え'){pkIdx=c.fieldIdx;st=c.status;memo=c.memoField;
        // 控えポケモンのstatus/extra/memoもpkへ書き戻す
        if(c.benchIdx!==undefined&&parties[c.benchIdx]){
          parties[c.benchIdx].currentStatus=c.benchStatus||'none';
          parties[c.benchIdx].currentExtra=[...(c.benchExtra||[])];
          parties[c.benchIdx].currentMemo=c.memoBench||'';
        }
      }
      if(pkIdx!==undefined&&parties[pkIdx]){parties[pkIdx].currentStatus=st||'none';parties[pkIdx].currentMemo=memo||'';}
    };
    syncCell(prev,1);syncCell(prev,2);
  }
  // +ボタン押下時点のスナップショットを保存（undoで復元用）
  // T1追加時は先発セルの状態をpkへ反映してからスナップ（先発スナップ兼用）
  if(n===0){
    [1,2].forEach(side=>{
      const leadIdx=state.opening['p'+side+'idx'];
      const pk=state.parties[side][leadIdx];
      if(pk){
        pk.currentStatus=state.opening['p'+side+'status']||'none';
        pk.currentExtra=[...(state.opening['p'+side+'extra']||[])];
        pk.currentMemo=state.opening['p'+side+'memo']||'';
      }
    });
  }
  const snap=snapshotParties();
  if(n===0)state.openingSnap=snap;
  // スナップ取得後にcellを構築 → status/extra/memoはスナップから取得
  const makeC=(pIdx,prevC,d,parties,sideNum)=>{
    const c=mkCell(prevC?(prevC.action==='控え'?'わざ':prevC.action):'わざ');
    c.fieldIdx=pIdx;
    c.outIdx=alive(parties,pIdx)?pIdx:firstAlive(parties,-1);
    c.switchInIdx=firstAlive(parties,pIdx);
    c.benchIdx=firstAlive(parties,pIdx);
    c.filterFainted=false;
    const pkSnap=snap[sideNum]?.[pIdx];
    c.status=pkSnap?.currentStatus||'none';
    c.outStatus=c.status;
    c.extra=[...d.extra];
    c.memo=pkSnap?.currentMemo||'';
    c.memoField=c.memo;
    if(d.ranks)c.ranks=d.ranks;
    c.absentType=prevC?.absentType??0;
    return c;
  };
  const c1=makeC(p1idx,prev?.c1,d1,state.parties[1],1);
  const c2=makeC(p2idx,prev?.c2,d2,state.parties[2],2);
  const _pk1=state.parties[1][p1idx];const _pk2=state.parties[2][p2idx];
  const prevH=prev||state.opening;
  const copyH=h=>({...h});
  state.turns.push({n:prev?prev.n:1,isNew:true,
    p1idx,p2idx,c1,c2,snap,
    hazards1:copyH(prevH.hazards1||mkHazards()),hazards2:copyH(prevH.hazards2||mkHazards()),
    time:prev?prev.time:'00:00',time1:prev?prev.time1:'00:00',time2:prev?prev.time2:'00:00',
    hp1:_pk1?_pk1.currentHP:undefined,hp2:_pk2?_pk2.currentHP:undefined,
    wi:prev?prev.wi:state.opening.wi,fi:prev?prev.fi:state.opening.fi,ri:prev?prev.ri:state.opening.ri});
  renderLog();
}
function undoLast(){
  if(!state.turns.length)return;
  const t=state.turns.pop();
  state.nextTurn=state.turns.length?state.turns[state.turns.length-1].n+1:1;
  if(t.snap)restoreParties(t.snap);
  renderAll();
}
function clearLog(){
  state.turns=[];state.nextTurn=1;
  // パーティのリセット
  [1,2].forEach(p=>state.parties[p].forEach(pk=>{
    pk.currentHP=pk.maxHP;
    pk.fainted=false;
    pk.currentStatus='none';
    pk.currentExtra=[];
    pk.currentMemo='';
    pk.note='';
  }));
  // 先発セルのリセット（状態異常・能力ランク・混乱等）
  const o=state.opening;
  o.p1status='none';o.p2status='none';
  o.p1ranks=mkRanks();o.p2ranks=mkRanks();
  o.p1extra=[];o.p2extra=[];
  o.p1memo='';o.p2memo='';
  o.wi=0;o.fi=0;o.ri=0;
  o.hazards1=mkHazards();o.hazards2=mkHazards();
  // 排他ランプのリセット
  state.litLamps={};
  state.openingSnap=null;
  renderAll();
}

function exportLog(){
  const payload={
    version:1,
    exportedAt:new Date().toISOString(),
    p1name:document.getElementById('p1name').value,
    p2name:document.getElementById('p2name').value,
    state:JSON.parse(JSON.stringify(state))
  };
  const json=JSON.stringify(payload,null,2);
  const blob=new Blob([json],{type:'application/json;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const dt=new Date();
  const ts=dt.getFullYear()+''+String(dt.getMonth()+1).padStart(2,'0')+String(dt.getDate()).padStart(2,'0')
    +'_'+String(dt.getHours()).padStart(2,'0')+String(dt.getMinutes()).padStart(2,'0');
  a.href=url;a.download='battle_'+ts+'.s.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),60000);
}

function _onImportFileSelected(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    let payload;
    try{
      payload=JSON.parse(ev.target.result);
    }catch(err){
      alert('ファイルの読み込みに失敗しました。正しい .s.json ファイルを選択してください。\n'+err);return;
    }
    if(!payload||!payload.state){
      alert('ファイル形式が正しくありません。');return;
    }
    if(!confirm('現在のデータをインポートした内容で上書きします。よろしいですか？'))return;
    if(payload.p1name!=null)document.getElementById('p1name').value=payload.p1name;
    if(payload.p2name!=null)document.getElementById('p2name').value=payload.p2name;
    state=JSON.parse(JSON.stringify(payload.state));
    // currentHP等の動的フィールドが未設定の場合に安全な初期値を補完する
    [1,2].forEach(p=>(state.parties[p]||[]).forEach(pk=>{
      if(pk.currentHP===undefined)pk.currentHP=pk.maxHP;
      if(pk.fainted===undefined)pk.fainted=false;
      if(pk.currentStatus===undefined)pk.currentStatus='none';
      if(!Array.isArray(pk.currentExtra))pk.currentExtra=[];
      if(pk.currentMemo===undefined)pk.currentMemo='';
    }));
    renderAll();
  };
  reader.readAsText(file,'UTF-8');
}

  chipFill.style.width=pct.toFixed(1)+'%';
  chipFill.style.background=pct<=25?'#D85A30':pct<=50?'#BA7517':'#639922';
}

function makeHPBar(parties,idx,storage,hpKey){
  const wrap=document.createElement('div');const pk=parties[idx];if(!pk)return wrap;
  const maxHP=pk.maxHP||100;if(storage[hpKey]===undefined)storage[hpKey]=pk.currentHP;
  const curHP=storage[hpKey];const pct=curHP/maxHP*100;
  const row=document.createElement('div');row.className='hp-row';
  const lbl=document.createElement('span');lbl.className='hp-label';lbl.textContent='HP';
  const track=document.createElement('div');track.className='hp-track';
  const fill=document.createElement('div');fill.className='hp-fill'+(pct<=25?' low':pct<=50?' mid':'');fill.style.width=pct.toFixed(1)+'%';
  const range=document.createElement('input');range.type='range';range.className='hp-range';range.min=0;range.max=maxHP;range.step=1;range.value=curHP;
  const num=document.createElement('input');num.type='number';num.className='hp-num';num.min=0;num.max=maxHP;num.value=curHP;
  const sync=(v)=>{
    storage[hpKey]=v;
    fill.style.width=(v/maxHP*100).toFixed(1)+'%';
    fill.className='hp-fill'+(v/maxHP<=0.25?' low':v/maxHP<=0.5?' mid':'');
    pk.currentHP=v;
    const chipSide=state.parties[1]===parties?1:2;
    updateChipFill(chipSide,idx,v,maxHP);
  };
  range.addEventListener('input',()=>{const v=parseInt(range.value)||0;num.value=v;sync(v);});
  num.addEventListener('input',()=>{let v=Math.min(maxHP,Math.max(0,parseInt(num.value)||0));range.value=v;sync(v);});
  track.appendChild(fill);track.appendChild(range);row.appendChild(lbl);row.appendChild(track);row.appendChild(num);wrap.appendChild(row);return wrap;
}

function makeLamp(turnIdx,side){
  const key=turnIdx+'-'+side;

  const el=document.createElement('div');
  el.className='lamp'+(state.litLamps[key]?' on':'');

  el.onclick=()=>{
    const wasOn=state.litLamps[key];

  };

}

function showInlineSug(inp,sug,pk){
  if(!pk){sug.style.display='none';return;}
  const q=inp.value.trim();const moves=pk.moves.filter(m=>m&&(!q||m.includes(q)));
  if(!moves.length){sug.style.display='none';return;}
  sug.innerHTML='';
  moves.forEach(m=>{const item=document.createElement('div');item.className='move-sug-item';item.textContent=m;item.onmousedown=()=>{inp.value=m;inp.dispatchEvent(new Event('change'));sug.style.display='none';};sug.appendChild(item);});
  const r=inp.getBoundingClientRect();
  sug.style.position='fixed';
  sug.style.left=r.left+'px';sug.style.right='auto';sug.style.width=r.width+'px';
  sug.style.top=(r.bottom+2)+'px';sug.style.bottom='auto';
  sug.style.display='block';
  const sr=sug.getBoundingClientRect();
  if(sr.bottom>window.innerHeight-8){sug.style.top='auto';sug.style.bottom=(window.innerHeight-r.top+2)+'px';}
}

function freezeEl(el){

  el.querySelectorAll('button').forEach(e=>{e.disabled=true;e.style.cursor='default';});
  el.querySelectorAll('*').forEach(e=>{if(!e.classList.contains('lamp'))e.onclick=null;});
  el.querySelectorAll('.status-badge,.extra-tag,.badge').forEach(e=>{
    const clone=e.cloneNode(true);e.parentNode.replaceChild(clone,e);
    clone.style.cursor='default';clone.style.pointerEvents='none';
  });
  el.style.opacity='0.45';
  el.style.pointerEvents='none';

        +'<div class="ir"><span class="il">特性</span><span class="iv2">'+esc(pk.ability||'—')+'</span><span class="il ml">持物</span><span class="iv2">'+esc(pk.item||'—')+'</span></div>'
        +'<div class="ir"><span class="il">HP</span>'
        +'<div class="hb"><div class="hf" style="width:'+hpPct+'%;background:'+hpColor+'"></div></div>'
        +'<span class="hn">'+curHP+'/'+maxHP+'</span></div>'
        +noteRow
        +'<div class="tc">'
        +'<div class="mb">'+(moves||'<span class="em">技なし</span>')+'</div>'
        +'<div class="evb">'+evRows+'</div>'
        +'</div>'
        +'</div></div>';
    });
    html+='</div>';
    return html;
  }

  /* ── ログページ ── */
  var STATUS_COLOR={'どく':'#3C3489','もうどく':'#2C2C2A','やけど':'#993C1D','まひ':'#633806','ねむり':'#0C447C','こおり':'#085041'};
  var STATUS_BG={'どく':'#EEEDFE','もうどく':'#D3D1C7','やけど':'#FAECE7','まひ':'#FAEEDA','ねむり':'#E6F1FB','こおり':'#E1F5EE'};
  var EXTRA_COLOR={'こんらん':'#633806','メロメロ':'#72243E','のろい':'#3C3489','やどりぎ':'#27500A','バインド':'#993C1D','あくむ':'#2C2C2A','挑発':'#991B1B','拘束':'#374151','身代':'#166534'};
  var EXTRA_BG={'こんらん':'#FAEEDA','メロメロ':'#FBEAF0','のろい':'#EEEDFE','やどりぎ':'#EAF3DE','バインド':'#FAECE7','あくむ':'#D3D1C7','挑発':'#FEE2E2','拘束':'#E5E7EB','身代':'#F0FDF4'};
  var RANK_COLOR={'A':'#D85A30','B':'#639922','C':'#854F0B','D':'#27500A','S':'#185FA5','E':'#AA44BB','F':'#888','G':'#555'};

  function statusTag(st){
    if(!st||st==='none') return '';
    var c=STATUS_COLOR[st]||'#333', b=STATUS_BG[st]||'#eee';
    return '<span class="ltag" style="color:'+c+';background:'+b+';">'+esc(MAJOR_LABEL[st]||st)+'</span>';
  }
  function extraTags(extra){
    var s='';
    (extra||[]).forEach(function(es){
      var c=EXTRA_COLOR[es]||'#333', b=EXTRA_BG[es]||'#eee';
      s+='<span class="ltag" style="color:'+c+';background:'+b+';">'+esc(es)+'</span>';
    });
    return s;
  }
  function rankRow(ranks){
    var s='';
    RANK_STATS.forEach(function(st){
      var v=(ranks||{})[st]||0;
      if(v!==0){ var c=RANK_COLOR[st]||'#666'; s+='<span class="lrank" style="color:'+c+';">'+st+(v>0?'+':'')+v+'</span>'; }
    });
    return s?'<div class="lrow-ranks"><span class="llbl">能力補正</span>'+s+'</div>':'';
  }
  function hpRow(pk, hpVal){
    if(!pk) return '';
    var maxHP=pk.maxHP||100;
    var curHP=hpVal!==undefined?hpVal:pk.currentHP;
    var pct=maxHP>0?(curHP/maxHP*100).toFixed(1):0;
    var col=pct<=25?'#D85A30':pct<=50?'#BA7517':'#639922';
    return '<div class="lrow-hp">'
      +'<span class="llbl">HP</span>'
      +'<div class="lhpbar"><div class="lhpfill" style="width:'+pct+'%;background:'+col+'"></div></div>'
      +'<span class="lhpnum">'+curHP+'/'+maxHP+'</span>'
      +'</div>';
  }
  function itemRow(pk){
    if(!pk) return '';
    var parts=[];
    if(pk.ability) parts.push('<span class="linfo-label">特性</span><span class="linfo-val">'+esc(pk.ability)+'</span>');
    if(pk.item)    parts.push('<span class="linfo-label">持物</span><span class="linfo-val">'+esc(pk.item)+'</span>');
    return parts.length?'<div class="linfo-row">'+parts.join('')+'</div>':'';
  }
  function moveRow(c){
    var hasMove=c.move&&c.move!=='—';
    if(!hasMove) return '';
    var cnt='<span class="lsub-move">×'+(c.moveCount??1)+'回</span>';
    if((c.critCount||0)>0) cnt+='<span class="ltag-crit">急所×'+c.critCount+'</span>';
    return '<div class="lrow-move"><span class="lmove">'+esc(c.move)+'</span>'+cnt+'</div>';
  }
  function memoRow(memo){
    return memo?'<div class="lrow"><span class="lmemo">'+esc(memo)+'</span></div>':'';
  }

  /* ポケモン名行：名前＋アクションバッジ＋ランプ＋ステータス */
  function pkHeadRow(pk, action, actionColor, st, playerColor, lampOn){
    var name=pk?esc(pk.name||'?'):'?';
    var nc=playerColor||'#1a1a1a';
    var lampBadge=lampOn?'<span class="llamp">先</span>':'';
    return '<div class="lrow lrow-head">'
      +'<span class="lpk" style="color:'+nc+';">'+name+'</span>'
      +'<span class="lbadge" style="border-color:'+actionColor+';color:'+actionColor+';">'+action+'</span>'
      +lampBadge
      +statusTag(st)
      +'</div>';
  }

  function buildLogCell(c, t, side, parties, playerColor){
    if(!c) return '<div class="lcell"></div>';
    var hpKey=side===1?'hp1':'hp2';
    var html='<div class="lcell">';

    if(c.action==='控え'){
      var fieldPk=parties[c.fieldIdx!==undefined?c.fieldIdx:0];
      var benchPk=c.benchIdx!==undefined?parties[c.benchIdx]:null;

      /* 場 */
      var fieldHTML='<div class="lkae-col">'
        +'<div class="lsublbl" style="color:'+playerColor+';">場のポケモン</div>'
        +pkHeadRow(fieldPk,'控え','#888',c.status,playerColor)
        +itemRow(fieldPk)
        +hpRow(fieldPk, t[hpKey])
        +rankRow(c.ranks)
        +(extraTags(c.extra)?'<div class="lrow lrow-tags">'+extraTags(c.extra)+'</div>':'')
        +moveRow(c)
        +memoRow(c.memoField)
        +'</div>';

      /* 控え */
      var benchHTML='<div class="lkae-col">'
        +'<div class="lsublbl" style="color:'+playerColor+';">控えポケモン</div>'
        +pkHeadRow(benchPk,'控',c.benchStatus&&c.benchStatus!=='none'?STATUS_COLOR[c.benchStatus]||'#888':'#888',c.benchStatus,playerColor)
        +itemRow(benchPk)
        +hpRow(benchPk, c.benchHP)
        +rankRow(c.benchRanks)
        +(extraTags(c.benchExtra)?'<div class="lrow lrow-tags">'+extraTags(c.benchExtra)+'</div>':'')
        +memoRow(c.memoBench)
        +'</div>';

      html+='<div class="lkae-wrap">'+fieldHTML+benchHTML+'</div>';

    } else {
      var pkIdx=t['p'+side+'idx'];
      var pk=parties[pkIdx];
      html+=pkHeadRow(pk, c.action, playerColor, c.status, playerColor);
      html+=itemRow(pk);
      html+=hpRow(pk, t[hpKey]);
      html+=rankRow(c.ranks);
      var et2=extraTags(c.extra); if(et2) html+='<div class="lrow lrow-tags">'+et2+'</div>';
      html+=moveRow(c);
      html+=memoRow(c.memo);
    }

    html+='</div>';
    return html;
  }

  /* ── 設置・壁ヘルパー ── */
  var HAZARD_BOOL=[
    ['hikari','光の壁','#0C447C','#E6F1FB'],
    ['reflector','リフレクター','#27500A','#EAF3DE'],
    ['magic','マジコ','#3C3489','#EEEDFE'],
    ['oikaze','追い風','#633806','#FAEEDA']
  ];
  var HAZARD_NUM=[
    ['makibishi','まきびし','#993C1D'],
    ['dokubishi','どくびし','#3C3489'],
    ['sutero','ステロ','#854F0B'],
    ['nebaneba','ネバネバ','#27500A'],
    ['togasteel','鋼トゲ','#555']
  ];

  function buildHazardsHTML(h){
    if(!h) return '';
    var tags='';
    HAZARD_BOOL.forEach(function(r){
      if(h[r[0]]) tags+='<span class="hztag" style="color:'+r[2]+';background:'+r[3]+';">'+r[1]+'</span>';
    });
    HAZARD_NUM.forEach(function(r){
      if(h[r[0]]>0) tags+='<span class="hztag" style="color:'+r[2]+';background:#f5f5f5;">'+r[1]+' '+h[r[0]]+'</span>';
    });
    return tags ? '<div class="hzrow">'+tags+'</div>' : '';
  }

  function buildEnvHTML(obj){
    var parts=[];
    var wi=obj.wi||0, fi=obj.fi||0, ri=obj.ri||0;
    if(wi>0) parts.push(WEATHER_OPTS[wi][0]+'<span class="envlbl">'+WEATHER_OPTS[wi][1]+'</span>');
    if(fi>0) parts.push(FIELD_OPTS[fi][0]+'<span class="envlbl">'+FIELD_OPTS[fi][1]+'</span>');
    if(ri>0) parts.push(ROOM_OPTS[ri][0]+'<span class="envlbl">'+ROOM_OPTS[ri][1]+'</span>');
    return parts.length ? '<div class="envcol-inner">'+parts.join('')+'</div>' : '<div class="envcol-inner envcol-none">—</div>';
  }

  var ABSENT_TYPE_LABELS_P=['','空中','水中','地中'];
  function absentTypeBadge(c){
    if(!c||!c.absentType)return '';
    var lbl=ABSENT_TYPE_LABELS_P[c.absentType]||'';
    return lbl?'<span class="labsent">'+lbl+'</span>':'';
  }
  function buildOpeningCell(side, playerColor){
    var o=state.opening;
    var pkIdx=o['p'+side+'idx']||0;
    var pk=state.parties[side][pkIdx];
    var maxHP=pk?(pk.maxHP||100):100;
    var status=o['p'+side+'status']||'none';
    var ranks=o['p'+side+'ranks']||{};
    var extra=o['p'+side+'extra']||[];
    var memo=o['p'+side+'memo']||'';
    var hazards=o['hazards'+side]||{};
    var lampOn=!!state.litLamps['opening-'+String(side)];

    var html='<div class="lcell">';
    html+=buildHazardsHTML(hazards);
    var lampBadge=lampOn?'<span class="llamp">先</span>':'';
    html+='<div class="lrow lrow-head">'
      +'<span class="lpk" style="color:'+playerColor+';">'+(pk?esc(pk.name||'?'):'?')+'</span>'
      +lampBadge
      +statusTag(status)
      +'</div>';
    html+=itemRow(pk);
    html+='<div class="lrow-hp">'
      +'<span class="llbl">HP</span>'
      +'<div class="lhpbar"><div class="lhpfill" style="width:100%;background:#639922"></div></div>'
      +'<span class="lhpnum">'+maxHP+'/'+maxHP+'</span>'
      +'</div>';
    var rb=rankRow(ranks); if(rb) html+=rb;
    var et=extraTags(extra); if(et) html+='<div class="lrow-tags">'+et+'</div>';
    if(memo) html+='<div class="lrow"><span class="lmemo">'+esc(memo)+'</span></div>';
    html+='</div>';
    return html;
  }

  function buildLogCell(c, t, side, parties, playerColor){
    if(!c) return '<div class="lcell"></div>';
    var hpKey=side===1?'hp1':'hp2';
    var hazards=t['hazards'+side]||{};
    var html='<div class="lcell">';
    var sideTime=t['time'+side];
    if(sideTime&&sideTime!=='00:00') html+='<div class="lcelltimer">'+esc(sideTime)+'</div>';
    html+=buildHazardsHTML(hazards);

    if(c.action==='控え'){
      var fieldPk=parties[c.fieldIdx!==undefined?c.fieldIdx:0];
      var benchPk=c.benchIdx!==undefined?parties[c.benchIdx]:null;

      var fieldHTML='<div class="lkae-col">'
        +'<div class="lsublbl" style="color:'+playerColor+';">場のポケモン</div>'
        +pkHeadRow(fieldPk,'控え','#888',c.status,playerColor)
        +itemRow(fieldPk)
        +hpRow(fieldPk, t[hpKey])
        +rankRow(c.ranks)
        +(extraTags(c.extra)?'<div class="lrow-tags">'+extraTags(c.extra)+'</div>':'')
        +moveRow(c)
        +memoRow(c.memoField)
        +'</div>';

      var benchHTML='<div class="lkae-col">'
        +'<div class="lsublbl" style="color:'+playerColor+';">控えポケモン</div>'
        +pkHeadRow(benchPk,'控',c.benchStatus&&c.benchStatus!=='none'?STATUS_COLOR[c.benchStatus]||'#888':'#888',c.benchStatus,playerColor)
        +itemRow(benchPk)
        +hpRow(benchPk, c.benchHP)
        +rankRow(c.benchRanks)
        +(extraTags(c.benchExtra)?'<div class="lrow-tags">'+extraTags(c.benchExtra)+'</div>':'')
        +memoRow(c.memoBench)
        +'</div>';

      html+='<div class="lkae-wrap">'+fieldHTML+benchHTML+'</div>';
    } else {
      var pkIdx=t['p'+side+'idx'];
      var pk=parties[pkIdx];
      var ti=state.turns.indexOf(t);
      var lampOn=!!state.litLamps[ti+'-'+side];
      html+=pkHeadRow(pk, c.action, playerColor, c.status, playerColor, lampOn);
      var absBadge=absentTypeBadge(c);if(absBadge)html+='<div>'+absBadge+'</div>';
      html+=itemRow(pk);
      html+=hpRow(pk, t[hpKey]);
      html+=rankRow(c.ranks);
      var et2=extraTags(c.extra); if(et2) html+='<div class="lrow-tags">'+et2+'</div>';
      html+=moveRow(c);
      html+=memoRow(c.memo);
    }
    html+='</div>';
    return html;
  }

  function buildLogPages(){
    var turns=state.turns;
    var TURNS_FIRST=3;
    var TURNS_REST=4;
    var pages='';
    var pageIdx=0;

    /* 先発行 */
    var oEnv=buildEnvHTML(state.opening);
    var openingRow='<div class="lrow-wrap lrow-opening">'
      +'<div class="ltn ltn-opening">先発</div>'
      +buildOpeningCell(1,'#185FA5')
      +'<div class="lenvcol">'+oEnv+'</div>'
      +buildOpeningCell(2,'#854F0B')
      +'</div>';

    /* ターンがない場合も先発行だけのページを生成 */
    if(!turns||!turns.length){
      var emptyRows='';
      for(var e=0;e<TURNS_FIRST;e++){
        emptyRows+='<div class="lrow-wrap lrow-empty"><div class="ltn"></div><div class="lcell"></div><div class="lenvcol"></div><div class="lcell"></div></div>';
      }
      return '<div class="lpage">'
        +'<div class="lpage-header">'
        +'<span class="lph-p1">'+esc(p1name)+'</span>'
        +'<span class="lph-title">バトル譜</span>'
        +'<span class="lph-p2">'+esc(p2name)+'</span>'
        +'</div>'
        +'<div class="lgrid">'+openingRow+emptyRows+'</div>'
        +'</div>';
    }

    var pos=0;
    while(pos<turns.length){
      var limit=pageIdx===0?TURNS_FIRST:TURNS_REST;
      var chunk=turns.slice(pos,pos+limit);
      var tStart=chunk[0].n, tEnd=chunk[chunk.length-1].n;
      var rows='';
      chunk.forEach(function(t){
        var c1html=buildLogCell(t.c1,t,1,state.parties[1],'#185FA5');
        var c2html=buildLogCell(t.c2,t,2,state.parties[2],'#854F0B');
        var timeStr=t.time&&t.time!=='00:00'?'<div class="envtime">'+esc(t.time)+'</div>':'';
        var envHTML=buildEnvHTML(t);
        rows+='<div class="lrow-wrap">'
          +'<div class="ltn"><span>T'+t.n+'</span></div>'
          +c1html
          +'<div class="lenvcol">'+timeStr+envHTML+'</div>'
          +c2html
          +'</div>';
      });
      for(var j=chunk.length;j<limit;j++){
        rows+='<div class="lrow-wrap lrow-empty">'
          +'<div class="ltn"></div><div class="lcell"></div><div class="lenvcol"></div><div class="lcell"></div>'
          +'</div>';
      }
      pages+='<div class="lpage">'
        +'<div class="lpage-header">'
        +'<span class="lph-p1">'+esc(p1name)+'</span>'
        +'<span class="lph-title">バトル譜　T'+tStart+'–T'+tEnd+'</span>'
        +'<span class="lph-p2">'+esc(p2name)+'</span>'
        +'</div>'
        +'<div class="lgrid">'+(pageIdx===0?openingRow:'')+rows+'</div>'
        +'</div>';
      pos+=limit;
      pageIdx++;
    }
    return pages;
  }

    '.llamp{font-size:7px;font-weight:700;color:#C9960C;background:#FFF8E1;border:1px solid #C9960C;border-radius:3px;padding:0 3px;flex-shrink:0}',
    '.lsub{font-size:9px;color:#555}',
    '.llbl{font-size:8px;font-weight:600;color:#aaa;white-space:nowrap;flex-shrink:0}',
    /* ── 特性・持ち物 ── */
    '.linfo-row{display:flex;gap:5px;flex-wrap:wrap}',
    '.linfo-label{font-size:8px;color:#aaa;font-weight:600}',
    '.linfo-val{font-size:9px;color:#333}',
    /* ── HPバー ── */
    '.lrow-hp{display:flex;align-items:center;gap:4px}',
    '.lhpbar{flex:1;height:6px;background:#e8e8e8;border-radius:3px;overflow:hidden}',
    '.lhpfill{height:100%;border-radius:3px}',
    '.lhpnum{font-size:8px;color:#666;white-space:nowrap;flex-shrink:0}',
    /* ── 能力補正 ── */
    '.lrow-ranks{display:flex;align-items:center;gap:3px;flex-wrap:wrap}',
    '.lrank{font-size:9px;font-weight:700}',
    /* ── 追加状態タグ ── */
    '.lrow-tags{display:flex;flex-wrap:wrap;gap:2px}',
    '.ltag{font-size:8px;border-radius:3px;padding:1px 4px;font-weight:500;white-space:nowrap}',
    /* ── 技行 ── */
    '.lrow-move{display:flex;align-items:center;gap:5px;flex-wrap:wrap}',
    '.lmove{font-size:11px;font-weight:700;color:#1a1a1a}',
    '.lsub-move{font-size:9px;color:#888}',
    '.ltag-crit{font-size:8px;font-weight:600;color:#D85A30;background:#FAECE7;border-radius:3px;padding:1px 4px}',
    /* ── メモ ── */
    '.lmemo{font-size:9px;color:#777;font-style:italic}',
    /* ── 控えの場・控え2カラム ── */
    '.lkae-wrap{display:grid;grid-template-columns:1fr 1fr;gap:4px;height:100%}',
    '.lkae-col{display:flex;flex-direction:column;gap:1px;overflow:hidden;border-right:1px solid #f0f0f0;padding-right:3px}',
    '.lkae-col:last-child{border-right:none;padding-right:0}',
    '.lsublbl{font-size:8px;font-weight:700;margin-bottom:1px}',
  ].join('\n');

  var col1=buildColumn(state.parties[1], p1name, '#185FA5');
  var col2=buildColumn(state.parties[2], p2name, '#854F0B');
  var logPages=buildLogPages();

  var fullHTML='<!DOCTYPE html>'
    +'<html lang="ja"><head><meta charset="UTF-8"><title>ポケモン譜</title>'
    +'<style>'+css+'</style></head><body>'
    +'<div class="ppage">'
    +'<div class="page-header"><span class="ph-title">ポケモン譜 — パーティ情報</span></div>'
    +'<div class="body">'+col1+col2+'</div>'
    +'</div>'
    +logPages
    +'<script>window.onload=function(){window.print();}<\/script>'
    +'</body></html>';

  var blob=new Blob([fullHTML],{type:'text/html;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  window.open(url,'_blank');
  setTimeout(function(){URL.revokeObjectURL(url);},60000);
}
function renderAll(){renderParties();renderLog();}
document.getElementById('p1name').addEventListener('input',renderAll);
document.getElementById('p2name').addEventListener('input',renderAll);
renderAll();
</script>
