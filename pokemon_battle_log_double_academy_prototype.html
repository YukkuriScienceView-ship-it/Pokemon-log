  'フシギバナ':['ソーラービーム','ねむりごな','やどりぎのたね','ギガドレイン'],
};
const DEFAULT_HP={'ピカチュウ':167,'リザードン':183,'カビゴン':331,'ゲンガー':151,'カメックス':175,'フシギバナ':183};

let state=buildInitialState();
let modalTarget=null;

function buildInitialState(){
  const mkOR=()=>({
    p1idx_a:0,p1idx_b:1,p2idx_a:0,p2idx_b:1,wi:0,fi:0,ri:0,
    p1status_a:'none',p1status_b:'none',p2status_a:'none',p2status_b:'none',
    p1ranks_a:mkRanks(),p1ranks_b:mkRanks(),p2ranks_a:mkRanks(),p2ranks_b:mkRanks(),
    p1extra_a:[],p1extra_b:[],p2extra_a:[],p2extra_b:[],
    p1memo_a:'',p1memo_b:'',p2memo_a:'',p2memo_b:''});
  return{turns:[],nextTurn:1,opening:mkOR(),openingSnap:null,litLamp:null,
    parties:{1:[mkPoke('ピカチュウ'),mkPoke('リザードン'),mkPoke('カビゴン'),mkPoke('ゲンガー'),mkPoke('カメックス'),mkPoke('フシギバナ')],
             2:[mkPoke('ピカチュウ'),mkPoke('リザードン'),mkPoke('カビゴン'),mkPoke('ゲンガー'),mkPoke('カメックス'),mkPoke('フシギバナ')]}};
}
function mkPoke(name){
  const ev={};EV_STATS.forEach(s=>ev[s]=0);
  const iv={};EV_STATS.forEach(s=>iv[s]=31);
  return{name,level:50,maxHP:DEFAULT_HP[name]||100,currentHP:DEFAULT_HP[name]||100,fainted:false,ev,iv,ability:'',item:'',
    moves:DEFAULT_MOVES[name]?[...DEFAULT_MOVES[name]]:['','','','']};
}
function mkRanks(){const r={};RANK_STATS.forEach(s=>r[s]=0);return r;}
function mkHazards(){return{hikari:false,reflector:false,magic:false,oikaze:false,makibishi:0,dokubishi:0,sutero:0,nebaneba:0,togasteel:0};}
function mkCell(action){
  return{action,move:'—',moveCount:0,critCount:0,status:'none',extra:[],ranks:mkRanks(),absentType:0,
    switchInIdx:undefined,outIdx:undefined,fieldIdx:undefined,
    outStatus:'none',outRanks:mkRanks(),inHP:undefined,outHP:undefined,
    benchIdx:undefined,benchStatus:'none',benchHP:undefined,
    memo:'',memoIn:'',memoOut:'',memoField:'',memoBench:''};
}
function registerMove(pk,moveName){
  if(!moveName||moveName==='—')return;
  if(pk.moves.includes(moveName))return;
  const idx=pk.moves.findIndex(m=>!m.trim());if(idx!==-1)pk.moves[idx]=moveName;
}
// ターン終了後の実際の場のポケモンインデックスを返す（ダブル対応）
function getActivePokeAfterTurn(side,turnIdx,slot){
  const sfx='_'+(slot||'a');
  if(turnIdx<0)return state.opening['p'+side+'idx'+sfx];
  const t=state.turns[turnIdx];
  const c=side===1?(slot==='b'?t.c1b:t.c1a):(slot==='b'?t.c2b:t.c2a);
  if(c.action==='控え')return getActivePokeAfterTurn(side,turnIdx-1,slot);
  return t['p'+side+'idx'+sfx];
}
function getPrevPokeIdx(side,turnIdx,slot){
  const sfx='_'+(slot||'a');
  if(turnIdx===0)return state.opening['p'+side+'idx'+sfx];
  return getActivePokeAfterTurn(side,turnIdx-1,slot);
}
function copyRanks(src){const r={};RANK_STATS.forEach(s=>r[s]=src[s]||0);return r;}
function getActiveCellData(side,n,slot){
  const sfx='_'+(slot||'a');
  if(n===0){
    const statusKey='p'+side+'status'+sfx;const memoKey='p'+side+'memo'+sfx;
    const ranksKey='p'+side+'ranks'+sfx;const extraKey='p'+side+'extra'+sfx;
    return{status:state.opening[statusKey]||'none',extra:[...(state.opening[extraKey]||[])],memo:state.opening[memoKey]||'',ranks:copyRanks(state.opening[ranksKey]||mkRanks())};
  }
  const prev=state.turns[n-1];
  const c=side===1?(slot==='b'?prev.c1b:prev.c1a):(slot==='b'?prev.c2b:prev.c2a);
  if(c.action==='控え')return{status:c.status||'none',extra:[...(c.extra||[])],memo:c.memoField||'',ranks:copyRanks(c.ranks)};
  return{status:c.status||'none',extra:[...(c.extra||[])],memo:c.memo||'',ranks:copyRanks(c.ranks)};
}
function snapshotParties(){
  const snap={};
  [1,2].forEach(p=>{
    snap[p]=state.parties[p].map(pk=>({
      currentHP:pk.currentHP,
      currentStatus:pk.currentStatus,
      currentExtra:[...(pk.currentExtra||[])],
      currentMemo:pk.currentMemo
    }));
  });
  return snap;
}
function restoreParties(snap){
  [1,2].forEach(p=>{
    state.parties[p].forEach((pk,i)=>{
      if(!snap[p][i])return;
      pk.currentHP=snap[p][i].currentHP;
      pk.currentStatus=snap[p][i].currentStatus;
      pk.currentExtra=[...(snap[p][i].currentExtra||[])];
      pk.currentMemo=snap[p][i].currentMemo;
    });
  });
}
function addTurn(){
  const isFainted=pk=>!pk||pk.currentHP<=0;
  const p1name=document.getElementById('p1name').value||'プレイヤー1';
  const p2name=document.getElementById('p2name').value||'プレイヤー2';
  if(state.parties[1].every(isFainted)){alert(p1name+'のポケモンが全滅しています');return;}
  if(state.parties[2].every(isFainted)){alert(p2name+'のポケモンが全滅しています');return;}
  const n=state.turns.length;const prev=n>0?state.turns[n-1]:null;
  const getPrevIdxFromDOM=(side,slot)=>{
    if(n===0)return state.opening['p'+side+'idx_'+slot];
    const sel=document.getElementById('pksel-'+side+slot+'-'+(n-1));
    return sel?parseInt(sel.value):getActivePokeAfterTurn(side,n-1,slot);
  };
  let p1idx_a=getPrevIdxFromDOM(1,'a'),p1idx_b=getPrevIdxFromDOM(1,'b');
  let p2idx_a=getPrevIdxFromDOM(2,'a'),p2idx_b=getPrevIdxFromDOM(2,'b');
  const orig1a=p1idx_a,orig1b=p1idx_b,orig2a=p2idx_a,orig2b=p2idx_b;
  // 瀕死でも自動交代しない - ポケモンはそのまま場に残す
  const d1a=getActiveCellData(1,n,'a'),d1b=getActiveCellData(1,n,'b');
  const d2a=getActiveCellData(2,n,'a'),d2b=getActiveCellData(2,n,'b');
  const alive=(parties,i)=>parties[i]&&parties[i].currentHP>0;
  const firstAlive=(parties,excludes)=>parties.findIndex((pk,i)=>!excludes.includes(i)&&pk.currentHP>0);
  // syncCell・opening同期を先に行いスナップを取ってからmakeCを実行
  if(prev){
    const syncCell=(t,side,slot)=>{
      const c=side===1?(slot==='a'?t.c1a:t.c1b):(slot==='a'?t.c2a:t.c2b);
      const parties=state.parties[side];
      let pkIdx=c.action==='控え'?c.fieldIdx:t['p'+side+'idx_'+slot];
      const st=c.status,memo=c.action==='控え'?c.memoField:c.memo;
      if(c.action==='控え'&&c.benchIdx!==undefined&&parties[c.benchIdx]){
        // 控えポケモンのstatus/extra/memoもpkへ書き戻す
        parties[c.benchIdx].currentStatus=c.benchStatus||'none';
        parties[c.benchIdx].currentExtra=[...(c.benchExtra||[])];
        parties[c.benchIdx].currentMemo=c.memoBench||'';
      }
      if(pkIdx!==undefined&&parties[pkIdx]){parties[pkIdx].currentStatus=st||'none';parties[pkIdx].currentMemo=memo||'';}
    };
    syncCell(prev,1,'a');syncCell(prev,1,'b');syncCell(prev,2,'a');syncCell(prev,2,'b');
  }
  // T1追加時は先発セルの状態をpkへ反映してからスナップ（先発スナップ兼用）
  if(n===0){
    [1,2].forEach(side=>{
      ['a','b'].forEach(slot=>{
        const sfx='_'+slot;
        const leadIdx=state.opening['p'+side+'idx'+sfx];
        const pk=state.parties[side][leadIdx];
        if(pk){
          pk.currentStatus=state.opening['p'+side+'status'+sfx]||'none';
          pk.currentExtra=[...(state.opening['p'+side+'extra'+sfx]||[])];
          pk.currentMemo=state.opening['p'+side+'memo'+sfx]||'';
        }
      });
    });
  }
  const snap=snapshotParties();
  if(n===0)state.openingSnap=snap;
  // スナップ取得後にmakeC実行 → status/extra/memoはスナップから取得
  const makeC=(pIdx,origIdx,prevC,d,parties,sideNum,pairIdx)=>{
    const c=mkCell(prevC?(prevC.action==='控え'?'わざ':prevC.action):'わざ');
    c.fieldIdx=pIdx;
    c.outIdx=alive(parties,origIdx)?origIdx:firstAlive(parties,[]);
    c.switchInIdx=firstAlive(parties,[origIdx,pairIdx]);
    c.benchIdx=firstAlive(parties,[pIdx,pairIdx]);
    const pkSnap=snap[sideNum]?.[pIdx];
    c.status=pkSnap?.currentStatus||'none';
    c.outStatus=c.status;
    c.extra=[...d.extra];
    c.memo=pkSnap?.currentMemo||'';
    c.memoField=c.memo;
    if(d.ranks)c.ranks=d.ranks;
    c.absentType=prevC?.absentType??0;
    return c;
  };
  const c1a=makeC(p1idx_a,orig1a,prev?.c1a,d1a,state.parties[1],1,p1idx_b);
  const c1b=makeC(p1idx_b,orig1b,prev?.c1b,d1b,state.parties[1],1,p1idx_a);
  const c2a=makeC(p2idx_a,orig2a,prev?.c2a,d2a,state.parties[2],2,p2idx_b);
  const c2b=makeC(p2idx_b,orig2b,prev?.c2b,d2b,state.parties[2],2,p2idx_a);
  const prevH=prev||state.opening;
  const copyH=h=>({...h});
  const _pk1a=state.parties[1][p1idx_a],_pk1b=state.parties[1][p1idx_b];
  const _pk2a=state.parties[2][p2idx_a],_pk2b=state.parties[2][p2idx_b];
  state.turns.push({n:prev?prev.n:1,isNew:true,
    p1idx_a,p1idx_b,p2idx_a,p2idx_b,c1a,c1b,c2a,c2b,snap,
    hazards1:copyH(prevH.hazards1||mkHazards()),hazards2:copyH(prevH.hazards2||mkHazards()),
    time:prev?prev.time:'00:00',time1:prev?prev.time1:'00:00',time2:prev?prev.time2:'00:00',
    hp1a:_pk1a?_pk1a.currentHP:undefined,hp1b:_pk1b?_pk1b.currentHP:undefined,
    hp2a:_pk2a?_pk2a.currentHP:undefined,hp2b:_pk2b?_pk2b.currentHP:undefined,
    wi:prev?prev.wi:state.opening.wi,fi:prev?prev.fi:state.opening.fi,ri:prev?prev.ri:state.opening.ri});
  renderLog();
}
function undoLast(){
  if(!state.turns.length)return;
  const t=state.turns.pop();
  state.nextTurn=state.turns.length?state.turns[state.turns.length-1].n+1:1;
  if(t.snap)restoreParties(t.snap);
  renderAll();
}
function clearLog(){
  state.turns=[];state.nextTurn=1;
  // パーティのリセット
  [1,2].forEach(p=>state.parties[p].forEach(pk=>{
    pk.currentHP=pk.maxHP;
    pk.fainted=false;
    pk.currentStatus='none';
    pk.currentExtra=[];
    pk.currentMemo='';
    pk.note='';
  }));
  // 先発セルのリセット（状態異常・能力ランク・混乱等）
  const o=state.opening;
  ['a','b'].forEach(slot=>{
    [1,2].forEach(side=>{
      o['p'+side+'status_'+slot]='none';
      o['p'+side+'ranks_'+slot]=mkRanks();
      o['p'+side+'extra_'+slot]=[];
      o['p'+side+'memo_'+slot]='';
      o['openCounter'+side+slot]=0;
    });
  });
  o.wi=0;o.fi=0;o.ri=0;
  o.hazards1=mkHazards();o.hazards2=mkHazards();
  // 排他ランプのリセット
  state.litLamp=null;
  state.openingSnap=null;
  renderAll();
}

function exportLog(){
  const payload={
    version:1,
    exportedAt:new Date().toISOString(),
    p1name:document.getElementById('p1name').value,
    p2name:document.getElementById('p2name').value,

  };
  const json=JSON.stringify(payload,null,2);
  const blob=new Blob([json],{type:'application/json;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const dt=new Date();
  const ts=dt.getFullYear()+''+String(dt.getMonth()+1).padStart(2,'0')+String(dt.getDate()).padStart(2,'0')
    +'_'+String(dt.getHours()).padStart(2,'0')+String(dt.getMinutes()).padStart(2,'0');
  a.href=url;a.download='battle_double_'+ts+'.d.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),60000);
}

function _onImportFileSelected(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    let payload;
    try{
      payload=JSON.parse(ev.target.result);
    }catch(err){
      alert('ファイルの読み込みに失敗しました。正しい .s.json ファイルを選択してください。\n'+err);return;
    }
    if(!payload||!payload.state){
      alert('ファイル形式が正しくありません。');return;
    }
    if(!confirm('現在のデータをインポートした内容で上書きします。よろしいですか？'))return;
    if(payload.p1name!=null)document.getElementById('p1name').value=payload.p1name;
    if(payload.p2name!=null)document.getElementById('p2name').value=payload.p2name;
    state=JSON.parse(JSON.stringify(payload.state));
    // currentHP等の動的フィールドが未設定の場合に安全な初期値を補完する
    [1,2].forEach(p=>(state.parties[p]||[]).forEach(pk=>{
      if(pk.currentHP===undefined)pk.currentHP=pk.maxHP;
      if(pk.fainted===undefined)pk.fainted=false;
      if(pk.currentStatus===undefined)pk.currentStatus='none';
      if(!Array.isArray(pk.currentExtra))pk.currentExtra=[];
      if(pk.currentMemo===undefined)pk.currentMemo='';
    }));
    renderAll();
  };
  reader.readAsText(file,'UTF-8');
}

  track.appendChild(fill);track.appendChild(range);row.appendChild(lbl);row.appendChild(track);row.appendChild(num);wrap.appendChild(row);return wrap;

        sel.onchange=()=>{
          const oldIdx=obj[slotKey];const newIdx=parseInt(sel.value);
          const oldSnap=t?.snap?.[side]?.[oldIdx];const oldHP=oldSnap?.currentHP??parties[oldIdx]?.maxHP;
          if(parties[oldIdx]){parties[oldIdx].currentHP=oldHP;updateChipFill(side,oldIdx,oldHP,parties[oldIdx].maxHP||100);}

        const sug=document.createElement('div');sug.className='move-sug';sug.style.display='none';

        mWrap.appendChild(inp);mWrap.appendChild(sug);moveRow.appendChild(mWrap);slotDiv.appendChild(moveRow);
        const cntWrap=document.createElement('div');cntWrap.style.cssText='display:flex;flex-direction:column;gap:0;';
        cntWrap.appendChild(makeMoveCountRow(c));
        slotDiv.appendChild(cntWrap);reMemo();slotDiv.appendChild(memoWrap);
      }
    }
    return slotDiv;
  };

  doubleWrap.appendChild(makeSlot('a'));
  doubleWrap.appendChild(makeSlot('b'));
  cell.appendChild(doubleWrap);
  return cell;
}

function showInlineSug(inp,sug,pk){
  if(!pk){sug.style.display='none';return;}
  const q=inp.value.trim();const moves=pk.moves.filter(m=>m&&(!q||m.includes(q)));
  if(!moves.length){sug.style.display='none';return;}
  sug.innerHTML='';
  moves.forEach(m=>{const item=document.createElement('div');item.className='move-sug-item';item.textContent=m;item.onmousedown=()=>{inp.value=m;inp.dispatchEvent(new Event('change'));sug.style.display='none';};sug.appendChild(item);});
  // position:fixed で overflow:hidden の祖先要素のクリップを回避
  const r=inp.getBoundingClientRect();
  sug.style.position='fixed';
  sug.style.left=r.left+'px';sug.style.right='auto';sug.style.width=r.width+'px';
  sug.style.top=(r.bottom+2)+'px';sug.style.bottom='auto';
  sug.style.display='block';
  const sr=sug.getBoundingClientRect();
  if(sr.bottom>window.innerHeight-8){sug.style.top='auto';sug.style.bottom=(window.innerHeight-r.top+2)+'px';}
}

function openPrintWindow(){
